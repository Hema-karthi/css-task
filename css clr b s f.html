<!DOCTYPE html>
<html>
<head>
    <title>CSS Styling Example</title>

    <style>
        
        .textColor {
            color: blue;
        }
        .border {
            border: 2px solid red;
            padding: 10px;
        }

        .bgColor {
            background-color: lightyellow;
            padding: 10px;
        }

        .bgImage {
            background-image: url("../image/strawbery.jpeg"); 
            background-repeat: no-repeat;
            height: 150px;
            color: white;
            padding: 20px;
        }
        .font {
            font-family: Arial, Verdana, sans-serif;
            font-size: 20px;
        }

        .boldText {
            font-weight: bold;
        }

        .italicText {
            font-style: italic;
        }

        .underlineText {
            text-decoration: underline;
        }
    </style>

</head>

<body>

<h1>CSS Styling Example</h1>

<p class="textColor">This text color is blue.</p>

<p class="border">This paragraph has a red border.</p>

<p class="bgColor">This paragraph has a light yellow background.</p>

<div class="bgImage">
    This section has a background image.
</div>

<p class="font">This text uses Arial / Verdana font family.</p>

<p class="boldText">This text is bold.</p>

<p class="italicText">This text is italic.</p>

<p class="underlineText">This text is underlined.</p>

</body>
</html>
